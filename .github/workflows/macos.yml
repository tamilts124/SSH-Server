name: MacOS SSH Internal Test
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: |
          pip install bs4 requests

            # 4️⃣ Setup SSH Server
      - name: Setup SSH Server
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          echo "🔧 Creating SSH user..."
          sudo sysadminctl -addUser runneradmin -fullName "SSH User" -password "$PASSWORD" || true
      
          echo "🔧 Setting password via dscl..."
          sudo dscl . -passwd /Users/runneradmin "$PASSWORD"
      
          echo "🔧 Verify password works at OS level..."
          dscl /Local/Default -authonly runneradmin "$PASSWORD" && echo "✅ Password OK" || echo "❌ Password WRONG"
      
          echo "🔧 Forcing bash shell for user..."
          sudo dscl . -create /Users/runneradmin UserShell /bin/bash
      
          echo "🔧 Enabling password authentication in SSH..."
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/#KbdInteractiveAuthentication yes/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/KbdInteractiveAuthentication no/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
      
          echo "🔧 Allow runneradmin in sshd_config..."
          echo "AllowUsers runner runneradmin" | sudo tee -a /etc/ssh/sshd_config
      
          echo "🔧 Enabling Remote Login..."
          sudo systemsetup -setremotelogin on || true
      
          echo "🔧 Restarting SSH daemon..."
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist || true
          sleep 2
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist || true
      
          echo "⏳ Waiting for SSH to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 22; then
              echo "✅ SSH is ready!"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
      
          echo "🔧 Print sshd_config for debug..."
          sudo cat /etc/ssh/sshd_config | grep -v "^#" | grep -v "^$"
      
          echo "🔧 Testing SSH locally..."
          brew install sshpass
          sshpass -p "$PASSWORD" ssh -v \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=yes \
            -o PreferredAuthentications=password \
            -p 22 runneradmin@localhost \
            "echo '✅ Login Success'; whoami; pwd"
        # 5️⃣ Run Python Script
      - name: Run Python Script
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
          DB_ADMIN_URL: ${{ secrets.DB_ADMIN_URL }}
        run: |
          python main.py "macos-ssh-server:22" 22
