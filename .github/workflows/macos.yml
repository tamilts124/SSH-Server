name: MacOs SSH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          brew install openssh sshpass
          pip install bs4 requests

      - name: Start SSH Server
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
          DB_ADMIN_URL: ${{ secrets.DB_ADMIN_URL }}
        run: |

          echo "===== CREATE USER ====="
          sudo sysadminctl -addUser runneradmin -fullName "SSH User" -password "$PASSWORD"

          echo "===== SUDO ACCESS ====="
          echo "runneradmin ALL=(ALL) ALL" | sudo tee -a /etc/sudoers

          echo "===== CONFIGURE SSH ACCESS ====="
          sudo dseditgroup -o delete -q com.apple.access_ssh || true
          sudo dseditgroup -o create -q runneradmin -t user com.apple.access_ssh

          echo "===== UPDATE SSH CONFIG ====="

          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

          echo "===== RESTART SSH ====="

          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist

          sleep 5

          echo "===== TEST LOGIN ====="

          sshpass -p "$PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -p 22 \
            runneradmin@localhost \
            "echo LOGIN_SUCCESS"

          echo "===== RUN SCRIPT ====="
          python main.py 22 "macos ssh 22"
