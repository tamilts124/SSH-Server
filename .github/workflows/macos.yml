name: MacOS SSH Internal Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

    # 1 Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    # 3 Install dependencies
    - name: Install Dependencies
      run: |
        pip install bs4 requests

    # 4 Setup SSH Server
    - name: Setup SSH Server
      env:
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |

        echo "===== CREATE USER ====="

        sudo sysadminctl -addUser runneradmin -fullName "SSH User" -password "$PASSWORD" || true
        
        echo "Set shell"
        sudo dscl . -create /Users/runneradmin UserShell /bin/bash
        
        echo "Set home"
        sudo dscl . -create /Users/runneradmin NFSHomeDirectory /Users/runneradmin
        
        echo "Set password again"
        sudo dscl . -passwd /Users/runneradmin "$PASSWORD"
        
        echo "Add to staff group"
        sudo dseditgroup -o edit -a runneradmin -t user staff
        
        echo "Unlock account"
        sudo pwpolicy -u runneradmin -setpolicy "isDisabled=0"
        
        echo "Create home directory"
        sudo createhomedir -c -u runneradmin > /dev/null || true
        sudo chown -R runneradmin:staff /Users/runneradmin
        
        echo "Verify authentication"
        dscl /Local/Default -authonly runneradmin "$PASSWORD" && echo "Password OK"

        echo "===== WRITE SSH CONFIG ====="

        sudo tee /etc/ssh/sshd_config > /dev/null <<EOF
        Port 22
        Protocol 2
        
        HostKey /etc/ssh/ssh_host_rsa_key
        HostKey /etc/ssh/ssh_host_ecdsa_key
        HostKey /etc/ssh/ssh_host_ed25519_key
        
        PasswordAuthentication yes
        KbdInteractiveAuthentication no
        ChallengeResponseAuthentication no
        UsePAM no

        PermitRootLogin yes
        PermitTTY yes
        PermitUserEnvironment yes
        UseDNS no
        PrintMotd yes
        
        AllowUsers runneradmin
        
        Subsystem sftp /usr/libexec/sftp-server
        LogLevel DEBUG3
        EOF

        echo "===== ENABLE SSH ====="

        sudo systemsetup -setremotelogin on || true

        sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist || true
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist

        sleep 3

        echo "===== CHECK SSH PORT ====="
        nc -zv localhost 22

        echo "===== SETUP SSH KEY AUTH ====="

        sudo mkdir -p /Users/runneradmin/.ssh

        ssh-keygen -t ed25519 -f /tmp/id_ed25519 -N ""

        sudo cp /tmp/id_ed25519.pub /Users/runneradmin/.ssh/authorized_keys

        sudo chown -R runneradmin:staff /Users/runneradmin/.ssh
        sudo chmod 700 /Users/runneradmin/.ssh
        sudo chmod 600 /Users/runneradmin/.ssh/authorized_keys

        echo "===== TEST LOCAL SSH LOGIN ====="

        ssh -i /tmp/id_ed25519 \
        -o StrictHostKeyChecking=no \
        -p 22 \
        runneradmin@localhost \
        "echo LOGIN_SUCCESS && whoami && pwd"

    # 5 Run Python Script
    - name: Run Python Script
      env:
        PASSWORD: ${{ secrets.PASSWORD }}
        DB_ADMIN_URL: ${{ secrets.DB_ADMIN_URL }}
      run: |
        echo "===== RUNNING PYTHON SCRIPT ====="
        python main.py "127.0.0.1:22" 22
