name: MacOs SSH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26-intel

    steps:

    - name: Checkout code
      uses: actions/checkout@v3


    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"


    - name: Install Dependencies
      run: |
        brew install openssh sshpass
        pip install bs4 requests


    - name: Install OpenSSH Server
      run: |
        echo "OpenSSH already available on macOS"
        ssh -V


    - name: Configure SSH
      env:
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |

        echo "===== CREATE USER ====="
        sudo sysadminctl -addUser runneradmin -fullName "SSH User" -password "$PASSWORD"

        echo "===== SUDO ACCESS ====="
        echo "runneradmin ALL=(ALL) ALL" | sudo tee -a /etc/sudoers

        BREW_PATH=$(which brew 2>/dev/null || true)

        if [ -n "$BREW_PATH" ]; then
          BREW_PREFIX=$(brew --prefix)
        
          # Create shared group (ignore error if exists)
          sudo dseditgroup -o create sharedgrp || true
        
          # Add both users
          sudo dseditgroup -o edit -a runner -t user sharedgrp
          sudo dseditgroup -o edit -a runneradmin -t user sharedgrp
        
          # Set group ownership
          sudo chown -R runner:sharedgrp "$BREW_PREFIX"
        
          # Allow both users to read/write
          sudo chmod -R 775 "$BREW_PREFIX"
        
          # Ensure new files inherit group
          sudo chmod -R g+s "$BREW_PREFIX"
        fi

        echo "===== ENABLE SSH ACCESS ====="
        sudo dseditgroup -o delete -q com.apple.access_ssh || true
        sudo dseditgroup -o create -q runneradmin -t user com.apple.access_ssh

        echo "===== CONFIGURE SSH ====="
        sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i '' 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

        echo "===== RESTART SSH ====="
        sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist || true
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist

        sleep 5

        echo "===== TEST LOGIN ====="
        sshpass -p "$PASSWORD" ssh \
          -o StrictHostKeyChecking=no \
          -o PreferredAuthentications=password \
          -o PubkeyAuthentication=no \
          -p 22 \
          runneradmin@localhost \
          "echo LOGIN_SUCCESS"


    - name: Start SSH + Run Python Script
      env:
        DB_ADMIN_URL: ${{ secrets.DB_ADMIN_URL }}
      run: |
        echo "SSH server started on port 22"
        python main.py "macos-ssh-server:22" 22
