name: Windows SSH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm

    steps:

    - name: Checkout code
      uses: actions/checkout@v3


    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"


    - name: Install Dependencies
      run: |
        pip install bs4 requests


    - name: Install OpenSSH Server
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
        Get-WindowsCapability -Online | Where-Object Name -like 'OpenSSH*'


    - name: Configure SSH
      run: |
        net user runneradmin ${{ secrets.PASSWORD }}

        Start-Service sshd
        Set-Service -Name sshd -StartupType Automatic

        if (!(Get-NetFirewallRule -Name sshd -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -Name sshd `
              -DisplayName 'OpenSSH Server (sshd)' `
              -Enabled True `
              -Direction Inbound `
              -Protocol TCP `
              -Action Allow `
              -LocalPort 22
        }

        Get-Service sshd


    - name: Start SSH + Run Python Script
      env:
        DB_ADMIN_URL: ${{ secrets.DB_ADMIN_URL }}
      run: |
        echo "SSH server started on port 22"
        python main.py "Windows SSH Server:22" 22
